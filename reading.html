<!DOCTYPE html>
<html lang="zh" data-theme="warm">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Reading · Cobb</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root,[data-theme="warm"]{--bg:#FDFAF5;--text:#2C2C2C;--text2:#6B6B6B;--text3:#999;--accent:#D94F30;--border:#E8E0D5;--font-display:'Bricolage Grotesque',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;--spine-bg:#f0ebe0}
[data-theme="terminal"]{--bg:#0a0a0a;--text:#c0c0c0;--text2:#888;--text3:#555;--accent:#0f0;--border:#1a1a1a;--font-display:'JetBrains Mono',monospace;--font-body:'JetBrains Mono',monospace;--font-mono:'JetBrains Mono',monospace;--spine-bg:#111}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.65;-webkit-font-smoothing:antialiased}
[data-theme="terminal"] body{-webkit-font-smoothing:none}
.wrap{max-width:720px;margin:0 auto;padding:2.5rem 1.5rem}
.back{font-size:.8rem;color:var(--text3);margin-bottom:2rem}.back a{color:var(--accent);text-decoration:none}
h1{font-family:var(--font-display);font-weight:800;font-size:2.2rem;letter-spacing:-.02em}.sub{color:var(--text3);font-size:.85rem;margin:.2rem 0 2rem}
/* shelf */
.shelf{display:flex;flex-wrap:wrap;gap:6px;align-items:flex-end;padding-bottom:1rem;margin-bottom:1.5rem;border-bottom:2px solid var(--border);position:relative}
.shelf::after{content:"";position:absolute;bottom:-8px;left:0;right:0;height:6px;background:linear-gradient(to bottom,var(--border),transparent);border-radius:2px}
.book{position:relative;cursor:pointer;transition:transform .3s cubic-bezier(.4,0,.2,1);writing-mode:vertical-rl;text-orientation:mixed;padding:.6rem .35rem;border-radius:3px 5px 5px 3px;min-height:140px;font-family:var(--font-display);font-size:.7rem;font-weight:700;letter-spacing:.04em;line-height:1.3;color:#fff;display:flex;align-items:flex-start;box-shadow:1px 2px 6px rgba(0,0,0,.12),inset -1px 0 0 rgba(255,255,255,.1)}
.book:hover{transform:translateY(-6px) scale(1.05);box-shadow:3px 6px 14px rgba(0,0,0,.16),inset -1px 0 0 rgba(255,255,255,.15);z-index:2}
.book .spine-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-height:100%}
.book-tooltip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem;font-size:.75rem;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;font-family:var(--font-body);writing-mode:horizontal-tb;color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.08);z-index:3}
.book:hover .book-tooltip{opacity:1}
.book-tooltip .tt-title{font-weight:700;display:block}.book-tooltip .tt-author{font-size:.7rem;color:var(--text2)}
.annotation{margin-top:-.5rem;font-size:.82rem;color:var(--text2);padding:.4rem 0;border-top:1px dashed var(--border)}
.annotation a{color:var(--accent);text-decoration:none;font-weight:600}
.annotation a:hover{text-decoration:underline}
.theme-btn{position:fixed;top:1rem;right:1.5rem;border:1px solid var(--border);border-radius:20px;padding:.3rem .8rem;cursor:pointer;font-size:.75rem;color:var(--text2);background:var(--bg);font-family:var(--font-body)}.theme-btn:hover{border-color:var(--accent);color:var(--accent)}
</style></head><body>
<div class="wrap">
<button class="theme-btn" id="t">🌙</button>
<p class="back"><a href="/">← Cobb</a></p>
<h1>书架 <span style="font-size:.85rem;font-weight:400;color:var(--text3)">Bookshelf</span></h1>
<p class="sub">Books I'm reading and have on my shelf.</p>
<div id="shelves"></div>
</div>
<script>
(function(){
  var colors=["#D94F30","#2A7B9B","#D4A843","#2D8B55","#8B5CF6","#E06B56","#3B82F6","#EC4899","#1E40AF","#7C3AED"];
  fetch("reading/posts.json").then(function(r){return r.json()}).then(function(posts){
    var root=document.getElementById("shelves");root.innerHTML="";if(!posts.length){root.innerHTML='<p style="color:var(--text3);padding:2rem 0">书架是空的。</p>';return}
    // group by theme
    var themes={};posts.reverse().forEach(function(p){var t=p.theme||"Other";if(!themes[t])themes[t]=[];themes[t].push(p)});
    Object.keys(themes).forEach(function(theme,tmIdx){
      var wrap=document.createElement("div");wrap.style.marginBottom="2rem";
      wrap.innerHTML='<h3 style="font-family:var(--font-display);font-weight:700;font-size:.9rem;color:var(--text2);margin-bottom:.6rem;letter-spacing:-.01em">'+theme+'</h3><div class="shelf"></div>';
      var shelf=wrap.querySelector(".shelf");
      themes[theme].forEach(function(p,i){var d=document.createElement("a");d.className="book";d.href=p.link;d.target="_blank";d.style.background=colors[(tmIdx*10+i)%colors.length];d.innerHTML='<span class="spine-title">'+p.title+'</span><span class="book-tooltip"><span class="tt-title">'+p.title+'</span><span class="tt-author">'+p.author+' · '+p.date+'</span></span>';shelf.appendChild(d)});
      root.appendChild(wrap)
    });
      }).catch(function(){document.getElementById("shelves").innerHTML='<p style="color:var(--text3)">Failed to load.</p>'});
  var b=document.getElementById("t"),h=document.documentElement;
  b.addEventListener("click",function(){var n=h.getAttribute("data-theme")==="warm"?"terminal":"warm";h.setAttribute("data-theme",n);b.textContent=n==="warm"?"🌙":"☀️";try{localStorage.setItem("theme",n)}catch(e){}});
  try{var s=localStorage.getItem("theme");if(s){h.setAttribute("data-theme",s);b.textContent=s==="warm"?"🌙":"☀️"}}catch(e){}
})();
</script>
</body>
</html>
